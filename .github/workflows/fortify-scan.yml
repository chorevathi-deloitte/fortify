name: Fortify Vulnerability Scan

on:
  pull_request:
    branches:
      - main

jobs:
  fortify-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write  # Required if you want to comment on PRs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Add build steps if necessary for your project
      # For Salesforce projects, you might need to install SFDX CLI or build the project
      # Example:
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '18'
      # - name: Install SFDX CLI
      #   run: npm install -g @salesforce/cli
      # - name: Authenticate and prepare project
      #   run: |
      #     sf org login jwt --username ${{ secrets.SF_USERNAME }} --jwt-key-file ${{ secrets.SF_JWT_KEY }} --set-default
      #     sf project deploy start --source-dir force-app --test-level NoTestRun

      - name: Setup Fortify CLI
        uses: fortify/github-action/setup@v1
        with:
          fcli: latest

      - name: Authenticate Fortify CLI
        run: |
          # This creates a session for the CLI to use in subsequent steps
          fcli fod session login --url "https://api.fortify.com" --client-id ${{ secrets.FOD_CLIENT_ID }} --client-secret ${{ secrets.FOD_CLIENT_SECRET }}


      - name: Run Fortify Scan
        uses: fortify/github-action@v3
        env:
          # For Fortify on Demand (FoD)
          FOD_URL: "https://api.fortify.com"
          FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
          FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
          release-id: "257019"
          application-id: "252894"
          export-sarif: true
          fod-release-create: true
          # Optional: FOD_RELEASE: MyApp:main
