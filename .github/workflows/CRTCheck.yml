# в”Ђв”Ђ STEP 3 в”Ђ Trigger CRT job, get job name, poll to completion в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Trigger and Poll CRT Job
        id: crt
        if: steps.pr_meta.outputs.has_pr == 'true'
        env:
          PROJECT_ID: ${{ secrets.CRT_PROJECT_ID }}
          JOB_ID:     ${{ secrets.CRT_TEST_JOB_ID }}
          API_KEY:    ${{ secrets.CRT_API_KEY }}
        run: |
          GQL="https://graphql.eu-robotic.copado.com/v1"

          echo "job_name=Unknown Job" >> $GITHUB_OUTPUT
          echo "job_id=${JOB_ID}"     >> $GITHUB_OUTPUT
          echo "build_id=N/A"         >> $GITHUB_OUTPUT
          echo "crt_status=NOT RUN"   >> $GITHUB_OUTPUT

          if [ -z "$PROJECT_ID" ] || [ -z "$JOB_ID" ]; then
            echo "вќЊ Missing PROJECT_ID or JOB_ID"
            echo "crt_status=MISSING SECRETS" >> $GITHUB_OUTPUT
            exit 1
          fi

          # в”Ђв”Ђ Probe which header the GQL endpoint accepts в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "--- Probing auth header on GraphQL endpoint ---"

          echo "-- 1) Authorization: Bearer --"
          R1=$(curl -s -X POST \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            "$GQL")
          echo "$R1"

          echo "-- 2) x-api-key --"
          R2=$(curl -s -X POST \
            -H "x-api-key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            "$GQL")
          echo "$R2"

          echo "-- 3) pace-api-key --"
          R3=$(curl -s -X POST \
            -H "pace-api-key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            "$GQL")
          echo "$R3"

          echo "-- 4) x-access-key --"
          R4=$(curl -s -X POST \
            -H "x-access-key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            "$GQL")
          echo "$R4"

          echo "-- 5) No auth header --"
          R5=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            "$GQL")
          echo "$R5"

          # в”Ђв”Ђ Pick whichever returned data, not an error в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          AUTH_HEADER=""
          for combo in \
            "Authorization: Bearer $API_KEY|$R1" \
            "x-api-key: $API_KEY|$R2" \
            "pace-api-key: $API_KEY|$R3" \
            "x-access-key: $API_KEY|$R4" \
            "none|$R5"; do
            HDR="${combo%%|*}"
            RESP="${combo##*|}"
            if echo "$RESP" | jq -e '.data' > /dev/null 2>&1; then
              AUTH_HEADER="$HDR"
              echo "вњ… Working auth header: $HDR"
              break
            fi
          done

          if [ -z "$AUTH_HEADER" ]; then
            echo "вќЊ All auth headers failed вЂ” paste logs above and share"
            echo "crt_status=AUTH FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

          # в”Ђв”Ђ Fetch job name в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "--- Fetching job info ---"
          JOB_QUERY=$(jq -n \
            --arg pid "$PROJECT_ID" \
            --arg jid "$JOB_ID" \
            '{"query":"query { job(projectId: \"\($pid)\", jobId: \"\($jid)\") { id name status } }"}')

          JOB_INFO=$(curl -s -X POST \
            -H "$AUTH_HEADER" \
            -H "Content-Type: application/json" \
            -d "$JOB_QUERY" \
            "$GQL")
          echo "Job info response: $JOB_INFO"

          JOB_NAME=$(echo "$JOB_INFO" | jq -r '.data.job.name // "Unknown Job"')
          echo "job_name=$JOB_NAME" >> $GITHUB_OUTPUT
          echo "job_id=$JOB_ID"     >> $GITHUB_OUTPUT

          # в”Ђв”Ђ Trigger build в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          echo "--- Triggering build ---"
          BUILD_MUTATION=$(jq -n \
            --arg pid "$PROJECT_ID" \
            --arg jid "$JOB_ID" \
            '{"query":"mutation { createBuild(projectId: \"\($pid)\", jobId: \"\($jid)\") { message data { id buildNumber status startTime } } }"}')

          RESPONSE=$(curl -s -X POST \
            -H "$AUTH_HEADER" \
            -H "Content-Type: application/json" \
            -d "$BUILD_MUTATION" \
            "$GQL")
          echo "Trigger response: $RESPONSE"

          BUILD_ID=$(echo "$RESPONSE" | jq -r '.data.createBuild.data.id // empty')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "вќЊ Failed to extract Build ID"
            echo "crt_status=TRIGGER FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "вњ… Build triggered вЂ” Build ID: $BUILD_ID"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

          # в”Ђв”Ђ Poll build status в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          MAX_ATTEMPTS=60
          ATTEMPT=0
          FINAL_STATUS="TIMED OUT"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30

            STATUS_QUERY=$(jq -n \
              --arg pid "$PROJECT_ID" \
              --arg bid "$BUILD_ID" \
              '{"query":"query { build(projectId: \"\($pid)\", buildId: \"\($bid)\") { id status } }"}')

            STATUS_RESP=$(curl -s -X POST \
              -H "$AUTH_HEADER" \
              -H "Content-Type: application/json" \
              -d "$STATUS_QUERY" \
              "$GQL" || echo '{}')

            STATUS=$(echo "$STATUS_RESP" | jq -r '.data.build.status // "UNKNOWN"')
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS вЂ” Status: $STATUS"

            case "$STATUS" in
              PASSED|SUCCESS|COMPLETED)
                FINAL_STATUS="PASSED"; break ;;
              FAILED|ERROR|ABORTED)
                FINAL_STATUS="FAILED ($STATUS)"; break ;;
              RUNNING|PENDING|QUEUED|IN_PROGRESS)
                echo "вЏі Still in progress..." ;;
              *)
                echo "вљ пёЏ  Unrecognised status: $STATUS" ;;
            esac
          done

          echo "crt_status=$FINAL_STATUS" >> $GITHUB_OUTPUT
          echo "Final CRT result: $FINAL_STATUS"
