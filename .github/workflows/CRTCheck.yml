name: Trigger Copado Robotic Testing Job

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - uat

jobs:
  trigger-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read

    steps:
      # в”Ђв”Ђ STEP 1 в”Ђ Checkout so config file is available в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout repository
        uses: actions/checkout@v4

      # в”Ђв”Ђ STEP 2 в”Ђ Find merged PR and collect all metadata в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Collect PR Metadata
        id: pr_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          COMMIT_SHA="${{ github.sha }}"

          PR_DATA=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.groot-preview+json" \
            "https://api.github.com/repos/$REPO/commits/$COMMIT_SHA/pulls")

          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[0].number // empty')

          # в”Ђв”Ђ Direct push = no PR в†’ skip everything в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          if [ -z "$PR_NUMBER" ]; then
            echo "вЏ­пёЏ  Direct push to uat вЂ” no associated PR. Skipping."
            echo "has_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_pr=true"          >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "run_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

          PR_RAISER=$(echo "$PR_DATA" | jq -r '.[0].user.login // empty')
          echo "pr_raiser=$PR_RAISER" >> $GITHUB_OUTPUT

          # в”Ђв”Ђ Latest approved reviewer в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          APPROVER=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" \
            | jq -r '[.[] | select(.state=="APPROVED")] | last | .user.login // "No approver found"')
          echo "pr_approver=$APPROVER" >> $GITHUB_OUTPUT

      # в”Ђв”Ђ STEP 3 в”Ђ Trigger CRT job, get job name, poll to completion в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Trigger and Poll CRT Job
        id: crt
        if: steps.pr_meta.outputs.has_pr == 'true'
        env:
          PROJECT_ID: ${{ secrets.CRT_PROJECT_ID }}
          JOB_ID:     ${{ secrets.CRT_TEST_JOB_ID }}
          API_KEY:    ${{ secrets.CRT_API_KEY }}
        run: |
          BASE="https://api.eu-robotic.copado.com/pace/v4"

          if [ -z "$PROJECT_ID" ] || [ -z "$JOB_ID" ]; then
            echo "вќЊ Missing PROJECT_ID or JOB_ID secret"
            exit 1
          fi

          JOB_INFO=$(curl -sf \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            "$BASE/projects/$PROJECT_ID/jobs/$JOB_ID" || echo '{}')
          JOB_NAME=$(echo "$JOB_INFO" | jq -r '.name // "Unknown Job"')
          echo "job_name=$JOB_NAME" >> $GITHUB_OUTPUT
          echo "job_id=$JOB_ID"     >> $GITHUB_OUTPUT

          RESPONSE=$(curl -s -X POST \
            "$BASE/projects/$PROJECT_ID/jobs/$JOB_ID/builds" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json")
          echo "Trigger response: $RESPONSE"

          BUILD_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$BUILD_ID" = "null" ] || [ -z "$BUILD_ID" ]; then
            echo "вќЊ Failed to extract Build ID"
            echo "crt_status=TRIGGER FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "вњ… Build triggered вЂ” Build ID: $BUILD_ID"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

          MAX_ATTEMPTS=60
          ATTEMPT=0
          FINAL_STATUS="TIMED OUT"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30

            STATUS_RESP=$(curl -sf \
              "$BASE/projects/$PROJECT_ID/jobs/$JOB_ID/builds/$BUILD_ID" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" || echo '{}')

            STATUS=$(echo "$STATUS_RESP" | jq -r '.status // "UNKNOWN"')
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS вЂ” Status: $STATUS"

            case "$STATUS" in
              PASSED|SUCCESS|COMPLETED)
                FINAL_STATUS="PASSED"; break ;;
              FAILED|ERROR|ABORTED)
                FINAL_STATUS="FAILED ($STATUS)"; break ;;
              RUNNING|PENDING|QUEUED|IN_PROGRESS)
                echo "вЏі Still in progress..." ;;
              *)
                echo "вљ пёЏ  Unrecognised status: $STATUS" ;;
            esac
          done

          echo "crt_status=$FINAL_STATUS" >> $GITHUB_OUTPUT
          echo "Final CRT result: $FINAL_STATUS"

      # в”Ђв”Ђ STEP 4 в”Ђ Print full summary to workflow logs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Print Job Summary
        if: steps.pr_meta.out
