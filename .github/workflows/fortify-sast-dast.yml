name: Fortify Vulnerability Scan

on:
  pull_request:
    branches:
      - main

jobs:
  fortify-sast-dast:
    name: Fortify on Demand Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      FOD_URL: ${{ vars.FOD_URL }}
      HAS_DAST_URL: ${{ secrets.FOD_DAST_SCAN_URL != '' }}
      FOD_DAST_ASSESSMENT_TYPE: ${{ vars.FOD_DAST_ASSESSMENT_TYPE || 'Dynamic Assessment' }}
      FOD_DAST_FREQUENCY: ${{ vars.FOD_DAST_FREQUENCY || 'SingleScan' }}
      FOD_DAST_ENVIRONMENT: ${{ vars.FOD_DAST_ENVIRONMENT || 'External' }}
      SOURCE_DIR: force-app  # Define the source directory for scanning
      FCLI_BOOTSTRAP_VERSION: latest  # Define the FCLI bootstrap version
      RELEASE_ID: ${{ vars.FOD_RELEASE_ID }}  # Release ID for the new trial account
      BYPASS_VIOLATIONS: ${{ vars.BYPASS_VIOLATIONS || false }}  # Set to true to bypass failure on violations
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List source directory contents
        run: |
          echo "SOURCE_DIR: ${{ env.SOURCE_DIR }}"
          if [ -d "${{ env.SOURCE_DIR }}" ]; then
            echo "Directory exists. Listing contents:"
            ls -la ${{ env.SOURCE_DIR }}
            echo "Total files: $(find ${{ env.SOURCE_DIR }} -type f | wc -l)"
          else
            echo "Directory does not exist!"
            exit 1
          fi

      - name: Setup Fortify ScanCentral
        uses: fortify/gha-setup-scancentral-client@v2

      - name: Setup FCLI
        uses: fortify/github-action/setup@v3
        with:
          fcli: latest

      - name: Package code
        run: |
          cd ${{ env.SOURCE_DIR }}
          scancentral package -bt none -o ../package.zip
          
          # Verify package was created
          if [ ! -f "../package.zip" ]; then
            echo "❌ Error: package.zip was not created"
            exit 1
          fi
          
          # Check package size
          PACKAGE_SIZE=$(du -h ../package.zip | cut -f1)
          echo "✅ Package created successfully"
          echo "Package size: $PACKAGE_SIZE"
          
          # List contents
          echo ""
          echo "Package contents:"
          unzip -l ../package.zip | head -20
          
          # Count files
          FILE_COUNT=$(unzip -l ../package.zip | tail -1 | awk '{print $2}')
          echo ""
          echo "Total files in package: $FILE_COUNT"
          
          if [ "$FILE_COUNT" -le 0 ]; then
            echo "❌ Warning: Package contains no files"
            exit 1
          fi

    #   - name: Upload and start SAST scan
    #     run: |
    #       fcli fod session login --url https://api.trial.fortify.com --client-id ${{ secrets.FOD_CLIENT_ID }} --client-secret ${{ secrets.FOD_CLIENT_SECRET }}
    #       fcli fod sast-scan start --rel "${{ env.RELEASE_ID }}" --file package.zip --store scan

    #   - name: Wait for SAST scan to complete
    #     run: |
    #       fcli fod sast-scan wait-for ::scan:: --timeout 90m --interval 30s

    #   - name: Export SARIF from FOD
    #     run: |
    #       fcli fod issue export-sast --rel "${{ env.RELEASE_ID }}" --format sarif -f gh-fortify-sast.sarif
    #       fcli fod session logout

      - name: Check SARIF export
        run: |
          if [ -f "gh-fortify-sast.sarif" ]; then
            SIZE=$(stat -c%s "gh-fortify-sast.sarif")
            if [ "$SIZE" -gt 100 ]; then
              echo "✅ SARIF exported successfully, size: $SIZE bytes"
            else
              echo "❌ SARIF file too small, may be empty or scan failed"
              cat gh-fortify-sast.sarif || echo "File contents empty"
              exit 1
            fi
          else
            echo "❌ SARIF file not found - scan may have failed"
            exit 1
          fi

      - name: Process and display scan results
        if: always()
        run: |
          echo "=== Fortify SAST Scan Results (from FoD) ==="
          echo ""
          
          # Install jq if not present
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          
          # Total violations
          VIOLATION_COUNT=$(jq '.runs[0].results | length' gh-fortify-sast.sarif 2>/dev/null || echo "0")
          echo "Total Violations Found: $VIOLATION_COUNT"
          echo ""
          
          # List of scanned files
          echo "Scanned Files:"
          jq -r '.runs[0].artifacts[]?.location?.uri' gh-fortify-sast.sarif 2>/dev/null | sort | uniq | sed 's/^/- /'
          echo ""
          
          # Violations per file
          echo "Violations per File:"
          jq -r '.runs[0].results[] | .locations[0].physicalLocation.artifactLocation.uri' gh-fortify-sast.sarif 2>/dev/null | sort | uniq -c | sort -nr | sed 's/^ *//;s/ /- /' | sed 's/^/- /'
          echo ""
          
          # Violation rules
          echo "Violation Rules:"
          jq -r '.runs[0].results[] | .ruleId' gh-fortify-sast.sarif 2>/dev/null | sort | uniq | sed 's/^/- /'

      - name: Fail if violations found
        if: always()
        run: |
          VIOLATION_COUNT=$(jq '.runs[0].results | length' gh-fortify-sast.sarif 2>/dev/null || echo "0")
          echo "Checking violation count: $VIOLATION_COUNT"
          if [ "$VIOLATION_COUNT" -gt 0 ] && [ "${{ env.BYPASS_VIOLATIONS }}" != "true" ]; then
            echo "❌ SECURITY VIOLATION: Found $VIOLATION_COUNT issues in scan results. Failing workflow."
            echo "To bypass this failure, set BYPASS_VIOLATIONS=true in repository variables."
            exit 1
          elif [ "$VIOLATION_COUNT" -gt 0 ] && [ "${{ env.BYPASS_VIOLATIONS }}" == "true" ]; then
            echo "⚠️ SECURITY VIOLATION: Found $VIOLATION_COUNT issues, but bypassing failure as requested."
            exit 0
          else
            echo "✅ Scan passed: No violations found."
            exit 0
          fi

      - name: Locate Fortify SAST SARIF report
        id: find-sast-sarif
        run: |
          set -euo pipefail
          sarif=$(find . -name 'gh-fortify-sast.sarif' -o -name '*.sarif' | head -n 1 || true)
          if [ -n "$sarif" ]; then
            echo "SARIF_PATH=$sarif" >> $GITHUB_OUTPUT
          else
            echo "SARIF_PATH=" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF to GitHub Security tab
        if: steps.find-sast-sarif.outputs.SARIF_PATH != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.find-sast-sarif.outputs.SARIF_PATH }}

      - name: Upload FPR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortify-fpr-report
          path: "gh-fortify-sast.sarif"
          if-no-files-found: warn
          retention-days: 30      
