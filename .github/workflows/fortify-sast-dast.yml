name: Fortify Vulnerability Scan

on:
  workflow_dispatch:
    inputs:
      bypass_violations:
        description: 'Bypass violations and pass the workflow even if issues are found'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

concurrency:
  group: fortify-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fortify-sast-dast:
    name: Fortify on Demand Scan
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write
    env:
      FOD_URL: ${{ vars.FOD_URL || 'https://trial.fortify.com' }}
      FOD_API_URL: ${{ vars.FOD_API_URL || 'https://api.trial.fortify.com' }}
      FOD_TENANT: ${{ secrets.FOD_TENANT }}
      FOD_USER: ${{ secrets.FOD_USER }}
      FOD_PAT: ${{ secrets.FOD_PAT }}
      SOURCE_DIR: force-app  # Define the source directory for scanning
      RELEASE_ID: ${{ secrets.FOD_RELEASE_ID }}  # Release ID for the new trial account
      BYPASS_VIOLATIONS: ${{ inputs.bypass_violations || vars.BYPASS_VIOLATIONS || 'false' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List source directory contents
        run: |
          echo "SOURCE_DIR: ${{ env.SOURCE_DIR }}"
          if [ -d "${{ env.SOURCE_DIR }}" ]; then
            echo "Directory exists. Listing files to be scanned:"
            find "${{ env.SOURCE_DIR }}" -type f | sort | sed 's/^/- /'
            echo ""
            echo "Total source files: $(find "${{ env.SOURCE_DIR }}" -type f | wc -l)"
          else
            echo "Directory does not exist!"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Setup Fortify ScanCentral
        uses: fortify/gha-setup-scancentral-client@v2

      - name: Package changed PR files
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            echo "Pull request packaging mode: using changed files against origin/$BASE_REF"
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRTUX origin/$BASE_REF...HEAD -- "${{ env.SOURCE_DIR }}" || true)
          else
            echo "Non-PR run; packaging all files under ${{ env.SOURCE_DIR }}"
            CHANGED_FILES=$(git ls-files "${{ env.SOURCE_DIR }}")
          fi

          echo "Changed files to include:"
          echo "$CHANGED_FILES"
          echo ""

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files found under ${{ env.SOURCE_DIR }}. Packaging full source directory."
            cd "${{ env.SOURCE_DIR }}"
            scancentral package -bt none -o ../package.zip
          else
            TMP_DIR=$(mktemp -d)
            echo "$CHANGED_FILES" | while IFS= read -r file; do
              if [ -f "$file" ]; then
                mkdir -p "$TMP_DIR/$(dirname "$file")"
                cp --parents "$file" "$TMP_DIR"
              fi
            done
            cd "$TMP_DIR"
            scancentral package -bt none -o "$GITHUB_WORKSPACE/package.zip"
          fi

          if [ ! -f "$GITHUB_WORKSPACE/package.zip" ]; then
            echo "❌ Error: package.zip was not created"
            exit 1
          fi

          PACKAGE_SIZE=$(du -h "$GITHUB_WORKSPACE/package.zip" | cut -f1)
          echo "✅ Package created successfully"
          echo "Package size: $PACKAGE_SIZE"
          echo ""
          echo "Package file list:"
          unzip -l "$GITHUB_WORKSPACE/package.zip" | sed '1,3d;$d' | awk '{print "- " $4}'
          echo ""
          FILE_COUNT=$(unzip -l "$GITHUB_WORKSPACE/package.zip" | tail -1 | awk '{print $2}')
          echo "Total files in package: $FILE_COUNT"
          if [ "$FILE_COUNT" -le 0 ]; then
            echo "❌ Warning: Package contains no files"
            exit 1
          fi

      - name: Download Fortify on Demand Universal CI Tool
        uses: fortify/gha-setup-fod-uploader@v1

      - name: Perform SAST scan
        run: |
          set -euo pipefail
          echo "Starting FoD SAST scan against release $RELEASE_ID"
          java -jar "$FOD_UPLOAD_JAR" \
            -z package.zip \
            -aurl "$FOD_API_URL" \
            -purl "$FOD_URL" \
            -rid "$RELEASE_ID" \
            -tc "$FOD_TENANT" \
            -uc "$FOD_USER" "$FOD_PAT" \
            $FOD_UPLOADER_OPTS \
            -n "$FOD_UPLOADER_NOTES"
        env:
          FOD_URL: "https://trial.fortify.com"
          FOD_API_URL: "https://api.trial.fortify.com"
          FOD_UPLOADER_OPTS: "-ep 2 -pp 2 -I 1 -apf"
          FOD_UPLOADER_NOTES: "Triggered by GitHub Actions (${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Download Results
        uses: fortify/gha-fod-generate-sarif@1.1.0
        with:
          base-url: "https://trial.fortify.com"
          tenant: ${{ env.FOD_TENANT }}
          user: ${{ env.FOD_USER }}
          password: ${{ env.FOD_PAT }}
          release-id: ${{ env.RELEASE_ID }}
          output: ./sarif/output.sarif

      - name: Check SARIF export
        run: |
          if [ -f "./sarif/output.sarif" ]; then
            SIZE=$(stat -c%s "./sarif/output.sarif")
            echo "SARIF file size: $SIZE bytes"
            if [ "$SIZE" -le 100 ]; then
              echo "❌ SARIF file appears too small"
              cat ./sarif/output.sarif || true
              exit 1
            fi
          else
            echo "❌ SARIF file not found - scan may have failed"
            exit 1
          fi

      - name: Process and display scan results
        if: always()
        run: |
          echo "=== Fortify SAST Scan Results ==="
          echo ""
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          SARIF=./sarif/output.sarif
          TOTAL=$(jq '.runs[0].results | length' "$SARIF" 2>/dev/null || echo "0")
          echo "Total Violations Found: $TOTAL"
          echo ""
          echo "Scanned Files:" 
          jq -r '.runs[0].artifacts[]?.location?.uri' "$SARIF" 2>/dev/null | sort | uniq | sed 's/^/- /'
          echo ""
          echo "Violations per File:"
          jq -r '.runs[0].results[]?.locations[0]?.physicalLocation?.artifactLocation?.uri' "$SARIF" 2>/dev/null | sort | uniq -c | sort -nr | awk '{print "- " $2 ": " $1}'
          echo ""
          echo "Violation Rules:"
          jq -r '.runs[0].results[]?.ruleId' "$SARIF" 2>/dev/null | sort | uniq | sed 's/^/- /'

      - name: Fail if violations found
        if: always()
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          TOTAL=$(jq '.runs[0].results | length' ./sarif/output.sarif 2>/dev/null || echo "0")
          echo "Checking violation count: $TOTAL"
          if [ "$TOTAL" -gt 0 ] && [ "${{ env.BYPASS_VIOLATIONS }}" != "true" ]; then
            echo "❌ SECURITY VIOLATION: Found $TOTAL issues. Failing workflow."
            echo "To bypass this failure, set BYPASS_VIOLATIONS=true in repository variables."
            exit 1
          elif [ "$TOTAL" -gt 0 ] && [ "${{ env.BYPASS_VIOLATIONS }}" == "true" ]; then
            echo "⚠️ Violations found ($TOTAL), but bypass is enabled."
            exit 0
          else
            echo "✅ No violations found."
            exit 0
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./sarif/output.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortify-sarif-report
          path: ./sarif/output.sarif
          if-no-files-found: warn
          retention-days: 30      
