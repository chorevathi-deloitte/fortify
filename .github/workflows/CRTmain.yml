name: Run Copado CRT

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  trigger-crt:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Trigger CRT Job
        run: |
          echo "🚀 Triggering Copado Robotic Testing Job..."

          RESPONSE=$(curl -s -X POST "https://eu-robotic.copado.com/pace/v4/projects/73283/builds" \
            -H "Content-Type: application/json" \
            -H "X-XSRF-TOKEN: 0Rmofp5mEH9IMJQ60hoYTQ==" \
            -H "Cookie: ${{ secrets.COPADO_COOKIE }}" \
            --data '{
              "jobId": 123456
            }')

          echo "Response: $RESPONSE"

          BUILD_ID=$(echo $RESPONSE | jq -r '.id')

          if [ "$BUILD_ID" = "null" ] || [ -z "$BUILD_ID" ]; then
            echo "❌ Failed to extract Build ID"
            exit 1
          fi

          echo "✅ Build triggered successfully"
          echo "Build ID: $BUILD_ID"

