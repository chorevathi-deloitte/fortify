name: Trigger Copado Robotic Testing Job

on:
  workflow_dispatch:
  push:
    branches:
      - main 

jobs:
  trigger-test:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger CRT Job
        run: |
          curl -v -X POST "https://eu-robotic.copado.com/api/v3/jobs/${{ secrets.CRT_TEST_JOB_ID }}/runs" \
            -H "Authorization: Bearer ${{ secrets.CRT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"projectId\": \"${{ secrets.CRT_PROJECT_ID }}\",
              \"testJobId\": \"${{ secrets.CRT_TEST_JOB_ID }}\"
            }"
